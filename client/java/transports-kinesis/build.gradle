plugins {
    id 'eclipse'
    id 'jacoco'
    id 'java'
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id "com.adarshr.test-logger" version "4.0.0"
    id 'com.diffplug.spotless' version '7.0.2'
    id "com.gradleup.shadow" version "9.4.1"
    id "pmd"
    id "io.freefair.lombok" version "9.5.0"
}

ext {
    projectDescription = "Kinesis OpenLineage transport library"
}

dependencies {
    implementation("software.amazon.kinesis:amazon-kinesis-producer:1.0.7")
    implementation("software.amazon.awssdk:sts:2.44.2")
    implementation("software.amazon.awssdk:auth:2.44.2")
}

apply from: '../transports.build.gradle'
