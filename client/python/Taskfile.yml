version: '3'

# Repo-wide Python formatting/linting (ruff) lives in the root Taskfile.
tasks:
  setup:
    desc: Install dependencies into the local venv (uv sync with all extras)
    cmds:
      - uv sync --extra test --extra dev --extra generator --extra kafka --extra msk-iam --extra datazone --extra fsspec --active

  test:
    desc: Run unit tests
    deps: [setup]
    cmds:
      - uv run pytest tests/

  typecheck:
    desc: Run mypy type checking
    cmds:
      - uv run mypy src/
