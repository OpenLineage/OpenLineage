version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.24'

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - unconvert
    - gocritic
    - revive
    - copyloopvar
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: unused-parameter
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: package-comments
  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/OpenLineage/openlineage/client/go
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
